{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GramSmart — Certificate Request</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    .service-card input[type="radio"]:checked + label {
      border-color: #16a34a;
      background-color: #f0fdf4;
      color: #15803d;
    }
  </style>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center px-4 py-10">

  <div class="bg-white w-full max-w-xl rounded-2xl shadow-lg p-6 sm:p-8">

    <!-- Header -->
    <div class="mb-6 text-center">
      <h1 class="text-2xl font-bold text-green-700">GramSmart</h1>
      <p class="text-gray-500 text-sm mt-1">Certificate & Document Request Portal</p>
    </div>

    <!-- Progress Indicator -->
    <div class="flex items-center justify-center mb-6 gap-2">
      <div class="flex items-center gap-2">
        <div class="w-7 h-7 rounded-full bg-green-600 text-white text-xs flex items-center justify-center font-bold">1</div>
        <span class="text-xs text-green-600 font-medium">Select Service</span>
      </div>
      <div class="w-8 h-0.5 bg-gray-300"></div>
      <div class="flex items-center gap-2">
        <div class="w-7 h-7 rounded-full bg-gray-200 text-gray-500 text-xs flex items-center justify-center font-bold">2</div>
        <span class="text-xs text-gray-400">Fill Details</span>
      </div>
      <div class="w-8 h-0.5 bg-gray-300"></div>
      <div class="flex items-center gap-2">
        <div class="w-7 h-7 rounded-full bg-gray-200 text-gray-500 text-xs flex items-center justify-center font-bold">3</div>
        <span class="text-xs text-gray-400">Confirm</span>
      </div>
    </div>

    <!-- Form -->
    <form method="POST" class="space-y-6">
      {% csrf_token %}

      <!-- Step 1: Service Type Selection -->
      <div>
        <label class="block text-sm font-semibold text-gray-700 mb-3">
          Select Certificate / Service Type <span class="text-red-500">*</span>
        </label>
        <div class="grid grid-cols-1 sm:grid-cols-2 gap-3">

          <!-- Domicile Certificate -->
          <div class="service-card">
            <input type="radio" name="service_type" id="domicile" value="residence_certificate" class="hidden" required />
            <label for="domicile" class="block border-2 border-gray-200 rounded-xl p-3 cursor-pointer hover:border-green-400 transition text-sm font-medium text-gray-700">
              🏠 Domicile Certificate
              <p class="text-xs text-gray-400 font-normal mt-1">Proof of local residence</p>
            </label>
          </div>

          <!-- Income Certificate -->
          <div class="service-card">
            <input type="radio" name="service_type" id="income" value="income_certificate" class="hidden" />
            <label for="income" class="block border-2 border-gray-200 rounded-xl p-3 cursor-pointer hover:border-green-400 transition text-sm font-medium text-gray-700">
              💰 Income Certificate
              <p class="text-xs text-gray-400 font-normal mt-1">Annual family income proof</p>
            </label>
          </div>

          <!-- Caste Certificate -->
          <div class="service-card">
            <input type="radio" name="service_type" id="caste" value="caste_certificate" class="hidden" />
            <label for="caste" class="block border-2 border-gray-200 rounded-xl p-3 cursor-pointer hover:border-green-400 transition text-sm font-medium text-gray-700">
              📋 Caste Certificate
              <p class="text-xs text-gray-400 font-normal mt-1">Official caste verification</p>
            </label>
          </div>

          <!-- Birth Certificate -->
          <div class="service-card">
            <input type="radio" name="service_type" id="birth" value="birth_certificate" class="hidden" />
            <label for="birth" class="block border-2 border-gray-200 rounded-xl p-3 cursor-pointer hover:border-green-400 transition text-sm font-medium text-gray-700">
              👶 Birth Certificate
              <p class="text-xs text-gray-400 font-normal mt-1">Date of birth official record</p>
            </label>
          </div>

          <!-- Death Certificate -->
          <div class="service-card">
            <input type="radio" name="service_type" id="death" value="death_certificate" class="hidden" />
            <label for="death" class="block border-2 border-gray-200 rounded-xl p-3 cursor-pointer hover:border-green-400 transition text-sm font-medium text-gray-700">
              🕊️ Death Certificate
              <p class="text-xs text-gray-400 font-normal mt-1">Official death registration</p>
            </label>
          </div>

          <!-- No Objection Certificate -->
          <div class="service-card">
            <input type="radio" name="service_type" id="noc" value="property_certificate" class="hidden" />
            <label for="noc" class="block border-2 border-gray-200 rounded-xl p-3 cursor-pointer hover:border-green-400 transition text-sm font-medium text-gray-700">
              ✅ No Objection Certificate
              <p class="text-xs text-gray-400 font-normal mt-1">NOC for official purposes</p>
            </label>
          </div>

        </div>
      </div>

      <!-- Step 2: Personal Details -->
      <div class="border-t pt-5">
        <label class="block text-sm font-semibold text-gray-700 mb-3">
          Personal Details
        </label>
        <div class="space-y-4">

          <!-- Full Name -->
          <div>
            <label class="block text-sm font-medium text-gray-600 mb-1">
              Full Name <span class="text-red-500">*</span>
            </label>
            <input
              type="text"
              name="full_name"
              placeholder="Enter your full name"
              required
              class="w-full border border-gray-300 rounded-lg px-4 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-green-500"
            />
          </div>

          <!-- Phone & Ward in grid -->
          <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
            <div>
              <label class="block text-sm font-medium text-gray-600 mb-1">
                Phone Number <span class="text-red-500">*</span>
              </label>
              <input
                type="tel"
                name="phone_number"
                placeholder="10-digit number"
                maxlength="15"
                required
                class="w-full border border-gray-300 rounded-lg px-4 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-green-500"
              />
            </div>
            <div>
              <label class="block text-sm font-medium text-gray-600 mb-1">
                Ward Number <span class="text-red-500">*</span>
              </label>
              <input
                type="text"
                name="ward_number"
                placeholder="e.g. W-04"
                required
                class="w-full border border-gray-300 rounded-lg px-4 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-green-500"
              />
            </div>
          </div>

          <!-- Date of Birth -->
          <div>
            <label class="block text-sm font-medium text-gray-600 mb-1">
              Date of Birth <span class="text-red-500">*</span>
            </label>
            <input
              type="date"
              name="dob"
              required
              class="w-full border border-gray-300 rounded-lg px-4 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-green-500"
            />
          </div>

          <!-- Address -->
          <div>
            <label class="block text-sm font-medium text-gray-600 mb-1">
              Residential Address <span class="text-red-500">*</span>
            </label>
            <textarea
              name="address"
              rows="3"
              placeholder="Enter your full residential address..."
              required
              class="w-full border border-gray-300 rounded-lg px-4 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-green-500 resize-none"
            ></textarea>
          </div>

          <!-- Purpose -->
          <div>
            <label class="block text-sm font-medium text-gray-600 mb-1">
              Purpose of Request
            </label>
            <input
              type="text"
              name="purpose"
              placeholder="e.g. Bank loan, School admission..."
              class="w-full border border-gray-300 rounded-lg px-4 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-green-500"
            />
          </div>

        </div>
      </div>

      <!-- Step 3: Declaration Checkboxes -->
      <div class="border-t pt-5">
        <label class="block text-sm font-semibold text-gray-700 mb-3">
          Declaration
        </label>
        <div class="space-y-3">

          <label class="flex items-start gap-3 cursor-pointer">
            <input
              type="checkbox"
              name="declaration_truth"
              required
              class="mt-0.5 h-4 w-4 accent-green-600"
            />
            <span class="text-sm text-gray-600">
              I declare that all the information provided above is true and correct to the best of my knowledge.
            </span>
          </label>

          <label class="flex items-start gap-3 cursor-pointer">
            <input
              type="checkbox"
              name="declaration_terms"
              required
              class="mt-0.5 h-4 w-4 accent-green-600"
            />
            <span class="text-sm text-gray-600">
              I agree to the GramSmart platform terms and consent to processing of my submitted details.
            </span>
          </label>

        </div>
      </div>

      <!-- Time Slot Selection -->
      <div class="border-t pt-5">
        <label class="block text-sm font-semibold text-gray-700 mb-2">
          Select Arrival Time Slot <span class="text-red-500">*</span>
        </label>
        <input type="hidden" id="scheduled_time" name="scheduled_time" value="" />
        <div id="slot-display" class="w-full border border-gray-300 rounded-lg px-4 py-2 text-sm bg-gray-50 text-gray-400 mb-2">
          No time slot selected. Click below to choose.
        </div>
        <button type="button" onclick="openSlotPicker()"
          class="w-full border border-green-600 text-green-600 font-semibold py-2.5 rounded-xl text-sm hover:bg-green-50 transition">
          🕐 Pick a Time Slot
        </button>
      </div>

      <!-- Submit Button -->
      <div class="pt-2">
        <button
          type="submit"
          class="w-full bg-green-600 hover:bg-green-700 text-white font-semibold py-3 rounded-xl text-sm transition duration-200"
        >
          Submit Certificate Request →
        </button>
      </div>

    </form>

    <!-- Footer -->
    <p class="text-center text-xs text-gray-400 mt-6">
      GramSmart — Unified Rural Governance Platform
    </p>

  </div>

  <script src="{% static 'appointments/js/jsonb_form_validation.js' %}"></script>
  <script>
  document.querySelector('form').addEventListener('submit', function (e) {
    e.preventDefault();
    e.stopPropagation();

    const form = document.querySelector('form');
    const submitBtn = form.querySelector('button[type="submit"]');

    // --- Remove any previous message ---
    const existing = document.getElementById('booking-message');
    if (existing) existing.remove();

    // --- Helper: get CSRF cookie ---
    function getCookie(name) {
      let cookieValue = null;
      if (document.cookie && document.cookie !== '') {
        document.cookie.split(';').forEach(function (cookie) {
          const trimmed = cookie.trim();
          if (trimmed.startsWith(name + '=')) {
            cookieValue = decodeURIComponent(trimmed.substring(name.length + 1));
          }
        });
      }
      return cookieValue;
    }

    // --- Read all form field values ---
    const serviceType   = form.querySelector('[name="service_type"]:checked');
    const fullName      = form.querySelector('[name="full_name"]').value.trim();
    const phoneNumber   = form.querySelector('[name="phone_number"]').value.trim();
    const wardNumber    = form.querySelector('[name="ward_number"]').value.trim();
    const dob           = form.querySelector('[name="dob"]').value.trim();
    const address       = form.querySelector('[name="address"]').value.trim();
    const purpose       = form.querySelector('[name="purpose"]').value.trim();
    const scheduledTime = document.getElementById('scheduled_time').value.trim();

    // --- Build JSONB payload ---
    const formDataJsonb = {
      applicant: {
        full_name:    fullName,
        phone_number: phoneNumber,
        ward_number:  wardNumber,
        dob:          dob,
        address:      address
      },
      appointment: {
        service_type:   serviceType ? serviceType.value : '',
        scheduled_time: scheduledTime,
        purpose:        purpose
      },
      declaration: {
        truth_confirmed: form.querySelector('[name="declaration_truth"]').checked,
        terms_confirmed: form.querySelector('[name="declaration_terms"]').checked
      },
      metadata: {
        submitted_at:  new Date().toISOString(),
        form_version:  'v1.0'
      }
    };

    // --- Build final JSON payload for API ---
    const payload = {
      service_type:     serviceType ? serviceType.value : '',
      scheduled_time:   scheduledTime,
      form_data_jsonb:  formDataJsonb
    };

    // --- Get auth token from sessionStorage ---
    const token = sessionStorage.getItem('gramsmart_token') || '';

    // --- Show loading state ---
    submitBtn.textContent = 'Booking...';
    submitBtn.disabled = true;

    // --- AJAX POST to appointments booking API ---
    fetch('/api/appointments/book/', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'X-CSRFToken': document.querySelector('[name=csrfmiddlewaretoken]').value,
        'Authorization': token ? 'Token ' + token : ''
      },
      body: JSON.stringify(payload),
      credentials: 'same-origin'
    })
    .then(function (response) {
      return response.json().then(function (data) {
        return { status: response.status, data: data };
      });
    })
    .then(function (result) {
      submitBtn.textContent = 'Submit Certificate Request →';
      submitBtn.disabled = false;

      if (result.status === 201) {
        // --- Success: redirect to confirmation page ---
        const tokenNumber   = result.data.appointment.token_number || '';
        const serviceLabel  = result.data.appointment.service_type || '';
        const scheduledVal  = result.data.appointment.scheduled_time || '';
        window.location.href = '/appointments/confirmation/?token='
          + encodeURIComponent(tokenNumber)
          + '&service=' + encodeURIComponent(serviceLabel)
          + '&time='    + encodeURIComponent(scheduledVal);

      } else if (result.status === 409) {
        // --- Slot full ---
        const msg = document.createElement('p');
        msg.id = 'booking-message';
        msg.className = 'text-yellow-600 text-sm text-center mt-4 font-medium';
        msg.textContent = '⚠️ This time slot is full. Please pick a different slot.';
        form.appendChild(msg);
        msg.scrollIntoView({ behavior: 'smooth', block: 'center' });

      } else {
        // --- Other server error ---
        const errorMsg = result.data.detail
          || result.data.non_field_errors
          || 'Booking failed. Please try again.';
        const msg = document.createElement('p');
        msg.id = 'booking-message';
        msg.className = 'text-red-500 text-sm text-center mt-4';
        msg.textContent = '❌ ' + (Array.isArray(errorMsg) ? errorMsg[0] : errorMsg);
        form.appendChild(msg);
        msg.scrollIntoView({ behavior: 'smooth', block: 'center' });
      }
    })
    .catch(function () {
      submitBtn.textContent = 'Submit Certificate Request →';
      submitBtn.disabled = false;
      const msg = document.createElement('p');
      msg.id = 'booking-message';
      msg.className = 'text-red-500 text-sm text-center mt-4';
      msg.textContent = '❌ Network error. Please check your connection and try again.';
      form.appendChild(msg);
    });

  }, true);
</script>
   <script>

    function openSlotPicker() {
      window.open('/appointments/slots/', 'SlotPicker', 'width=650,height=700,scrollbars=yes');
    }
    function receiveTimeSlot(slot) {
      // Convert "10:30 AM" to ISO datetime for today
      const today = new Date();
      today.setDate(today.getDate() + 1);
      const [time, modifier] = slot.split(' ');
      let [hours, minutes] = time.split(':').map(Number);
      if (modifier === 'PM' && hours !== 12) hours += 12;
      if (modifier === 'AM' && hours === 12) hours = 0;
      today.setHours(hours, minutes, 0, 0);
      const isoTime = today.toISOString();
      document.getElementById('scheduled_time').value = isoTime;
      document.getElementById('slot-display').textContent = '✅ Selected: ' + slot;
      document.getElementById('slot-display').className =
        'w-full border border-green-300 rounded-lg px-4 py-2 text-sm bg-green-50 text-green-700 mb-2';
    }
  </script>
</body>
</html>
