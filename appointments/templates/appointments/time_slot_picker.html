<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GramSmart — Select Time Slot</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    .slot-btn {
      transition: all 0.15s ease;
    }
    .slot-btn:focus {
      outline: none;
    }
    .slot-selected {
      background-color: #16a34a !important;
      color: white !important;
      border-color: #16a34a !important;
      transform: scale(1.03);
      box-shadow: 0 0 0 3px rgba(22,163,74,0.25);
    }
    .slot-full {
      background-color: #f3f4f6 !important;
      color: #9ca3af !important;
      border-color: #e5e7eb !important;
      cursor: not-allowed !important;
      opacity: 0.6;
    }
    .slot-limited {
      border-color: #f59e0b !important;
      color: #92400e !important;
      background-color: #fffbeb !important;
    }
  </style>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center px-4 py-10">

  <div class="bg-white w-full max-w-xl rounded-2xl shadow-lg p-6 sm:p-8">

    <!-- Header -->
    <div class="mb-6 text-center">
      <h1 class="text-2xl font-bold text-green-700">GramSmart</h1>
      <p class="text-gray-500 text-sm mt-1">Select Your Arrival Time Slot</p>
    </div>

    <!-- Date Display -->
    <div class="bg-green-50 border border-green-200 rounded-xl px-4 py-3 mb-6 flex items-center justify-between">
      <div>
        <p class="text-xs text-gray-500">Appointment Date</p>
        <p class="text-sm font-semibold text-green-800" id="appointment-date">Today</p>
      </div>
      <div class="text-right">
        <p class="text-xs text-gray-500">Office Hours</p>
        <p class="text-sm font-semibold text-green-800">9:00 AM – 5:00 PM</p>
      </div>
    </div>

    <!-- Legend -->
    <div class="flex items-center gap-4 mb-4 text-xs text-gray-500 flex-wrap">
      <span class="flex items-center gap-1.5">
        <span class="w-3 h-3 rounded-sm bg-green-600 inline-block"></span> Selected
      </span>
      <span class="flex items-center gap-1.5">
        <span class="w-3 h-3 rounded-sm bg-white border-2 border-gray-300 inline-block"></span> Available
      </span>
      <span class="flex items-center gap-1.5">
        <span class="w-3 h-3 rounded-sm bg-yellow-100 border-2 border-yellow-400 inline-block"></span> Limited
      </span>
      <span class="flex items-center gap-1.5">
        <span class="w-3 h-3 rounded-sm bg-gray-100 border-2 border-gray-200 inline-block"></span> Full
      </span>
    </div>

    <!-- Morning Slots -->
    <div class="mb-5">
      <p class="text-xs font-semibold text-gray-400 uppercase tracking-wide mb-3">🌅 Morning Session</p>
      <div class="grid grid-cols-3 gap-3" id="morning-slots">

        <button onclick="selectSlot(this)" data-time="9:00 AM" data-capacity="available"
          class="slot-btn border-2 border-gray-200 rounded-xl py-3 px-2 text-center hover:border-green-400 hover:bg-green-50">
          <p class="text-sm font-bold text-gray-700">9:00 AM</p>
          <p class="text-xs text-green-600 mt-0.5">4 left</p>
        </button>

        <button onclick="selectSlot(this)" data-time="9:30 AM" data-capacity="available"
          class="slot-btn border-2 border-gray-200 rounded-xl py-3 px-2 text-center hover:border-green-400 hover:bg-green-50">
          <p class="text-sm font-bold text-gray-700">9:30 AM</p>
          <p class="text-xs text-green-600 mt-0.5">6 left</p>
        </button>

        <button onclick="selectSlot(this)" data-time="10:00 AM" data-capacity="limited"
          class="slot-btn slot-limited border-2 rounded-xl py-3 px-2 text-center">
          <p class="text-sm font-bold">10:00 AM</p>
          <p class="text-xs mt-0.5 text-yellow-700">2 left</p>
        </button>

        <button onclick="selectSlot(this)" data-time="10:30 AM" data-capacity="available"
          class="slot-btn border-2 border-gray-200 rounded-xl py-3 px-2 text-center hover:border-green-400 hover:bg-green-50">
          <p class="text-sm font-bold text-gray-700">10:30 AM</p>
          <p class="text-xs text-green-600 mt-0.5">5 left</p>
        </button>

        <button disabled data-time="11:00 AM" data-capacity="full"
          class="slot-btn slot-full border-2 rounded-xl py-3 px-2 text-center">
          <p class="text-sm font-bold">11:00 AM</p>
          <p class="text-xs mt-0.5">Full 🔒</p>
        </button>

        <button onclick="selectSlot(this)" data-time="11:30 AM" data-capacity="limited"
          class="slot-btn slot-limited border-2 rounded-xl py-3 px-2 text-center">
          <p class="text-sm font-bold">11:30 AM</p>
          <p class="text-xs mt-0.5 text-yellow-700">1 left</p>
        </button>

      </div>
    </div>

    <!-- Afternoon Slots -->
    <div class="mb-6">
      <p class="text-xs font-semibold text-gray-400 uppercase tracking-wide mb-3">☀️ Afternoon Session</p>
      <div class="grid grid-cols-3 gap-3" id="afternoon-slots">

        <button disabled data-time="12:00 PM" data-capacity="full"
          class="slot-btn slot-full border-2 rounded-xl py-3 px-2 text-center">
          <p class="text-sm font-bold">12:00 PM</p>
          <p class="text-xs mt-0.5">Full 🔒</p>
        </button>

        <button onclick="selectSlot(this)" data-time="12:30 PM" data-capacity="available"
          class="slot-btn border-2 border-gray-200 rounded-xl py-3 px-2 text-center hover:border-green-400 hover:bg-green-50">
          <p class="text-sm font-bold text-gray-700">12:30 PM</p>
          <p class="text-xs text-green-600 mt-0.5">3 left</p>
        </button>

        <button onclick="selectSlot(this)" data-time="1:00 PM" data-capacity="available"
          class="slot-btn border-2 border-gray-200 rounded-xl py-3 px-2 text-center hover:border-green-400 hover:bg-green-50">
          <p class="text-sm font-bold text-gray-700">1:00 PM</p>
          <p class="text-xs text-green-600 mt-0.5">6 left</p>
        </button>

        <button onclick="selectSlot(this)" data-time="2:00 PM" data-capacity="available"
          class="slot-btn border-2 border-gray-200 rounded-xl py-3 px-2 text-center hover:border-green-400 hover:bg-green-50">
          <p class="text-sm font-bold text-gray-700">2:00 PM</p>
          <p class="text-xs text-green-600 mt-0.5">5 left</p>
        </button>

        <button onclick="selectSlot(this)" data-time="2:30 PM" data-capacity="limited"
          class="slot-btn slot-limited border-2 rounded-xl py-3 px-2 text-center">
          <p class="text-sm font-bold">2:30 PM</p>
          <p class="text-xs mt-0.5 text-yellow-700">2 left</p>
        </button>

        <button disabled data-time="3:00 PM" data-capacity="full"
          class="slot-btn slot-full border-2 rounded-xl py-3 px-2 text-center">
          <p class="text-sm font-bold">3:00 PM</p>
          <p class="text-xs mt-0.5">Full 🔒</p>
        </button>

        <button onclick="selectSlot(this)" data-time="3:30 PM" data-capacity="available"
          class="slot-btn border-2 border-gray-200 rounded-xl py-3 px-2 text-center hover:border-green-400 hover:bg-green-50">
          <p class="text-sm font-bold text-gray-700">3:30 PM</p>
          <p class="text-xs text-green-600 mt-0.5">4 left</p>
        </button>

        <button onclick="selectSlot(this)" data-time="4:00 PM" data-capacity="available"
          class="slot-btn border-2 border-gray-200 rounded-xl py-3 px-2 text-center hover:border-green-400 hover:bg-green-50">
          <p class="text-sm font-bold text-gray-700">4:00 PM</p>
          <p class="text-xs text-green-600 mt-0.5">6 left</p>
        </button>

        <button onclick="selectSlot(this)" data-time="4:30 PM" data-capacity="limited"
          class="slot-btn slot-limited border-2 rounded-xl py-3 px-2 text-center">
          <p class="text-sm font-bold">4:30 PM</p>
          <p class="text-xs mt-0.5 text-yellow-700">1 left</p>
        </button>

      </div>
    </div>

    <!-- Selected Slot Display -->
    <div id="selected-display" class="hidden bg-green-50 border border-green-300 rounded-xl px-4 py-3 mb-5">
      <p class="text-xs text-gray-500">Selected Slot</p>
      <p class="text-sm font-bold text-green-700" id="selected-time">—</p>
    </div>

    <!-- Hidden input for form submission -->
    <input type="hidden" id="selected-slot" name="scheduled_time" value="" />

    <!-- Action Buttons -->
    <div class="flex flex-col sm:flex-row gap-3">
      <a href="/appointments/request/"
        class="w-full text-center border border-green-600 text-green-600 font-semibold py-2.5 rounded-xl text-sm hover:bg-green-50 transition">
        ← Back to Request
      </a>
      <button onclick="confirmSlot()"
        class="w-full bg-green-600 hover:bg-green-700 text-white font-semibold py-2.5 rounded-xl text-sm transition">
        Confirm Time Slot ✔
      </button>
    </div>

    <!-- Footer -->
    <p class="text-center text-xs text-gray-400 mt-6">
      GramSmart — Unified Rural Governance Platform
    </p>

  </div>

  <script>
    // Set today's date
    var today = new Date();
    var options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
    document.getElementById('appointment-date').textContent = today.toLocaleDateString('en-IN', options);

    var selectedButton = null;

    function selectSlot(btn) {
      // Deselect previous
      if (selectedButton) {
        selectedButton.classList.remove('slot-selected');
        // Restore original state based on capacity
        var cap = selectedButton.getAttribute('data-capacity');
        if (cap === 'limited') {
          selectedButton.classList.add('slot-limited');
        } else {
          selectedButton.classList.add('border-gray-200');
        }
      }

      // Select new
      selectedButton = btn;
      btn.classList.remove('slot-limited', 'border-gray-200');
      btn.classList.add('slot-selected');

      // Update hidden input
      var time = btn.getAttribute('data-time');
      document.getElementById('selected-slot').value = time;

      // Update display
      document.getElementById('selected-time').textContent = time;
      document.getElementById('selected-display').classList.remove('hidden');
    }

    function confirmSlot() {
      var slot = document.getElementById('selected-slot').value;
      if (!slot) {
        alert('Please select a time slot before confirming.');
        return;
      }
      // Send back to parent or redirect
      if (window.opener && !window.opener.closed) {
        window.opener.receiveTimeSlot(slot);
        window.close();
      } else {
        alert('Time slot confirmed: ' + slot);
      }
    }
  </script>

</body>
</html>
