{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GramSmart — Log a Complaint</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center px-4 py-10">

  <div class="bg-white w-full max-w-lg rounded-2xl shadow-lg p-6 sm:p-8">

    <!-- Header -->
    <div class="mb-6 text-center">
      <h1 class="text-2xl font-bold text-green-700">GramSmart</h1>
      <p class="text-gray-500 text-sm mt-1">Log a Public Grievance</p>
    </div>

    <!-- Form -->
    <form method="POST" enctype="multipart/form-data" class="space-y-5">

      {% csrf_token %}

      <!-- Full Name -->
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">
          Full Name
        </label>
        <input
          type="text"
          name="full_name"
          placeholder="Enter your full name"
          required
          class="w-full border border-gray-300 rounded-lg px-4 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-green-500"
        />
      </div>

      <!-- Phone Number -->
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">
          Phone Number
        </label>
        <input
          type="tel"
          name="phone_number"
          placeholder="Enter your 10-digit phone number"
          maxlength="15"
          required
          class="w-full border border-gray-300 rounded-lg px-4 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-green-500"
        />
      </div>

      <!-- Ward Number -->
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">
          Ward Number
        </label>
        <input
          type="text"
          name="ward_number"
          placeholder="e.g. W-04"
          required
          class="w-full border border-gray-300 rounded-lg px-4 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-green-500"
        />
      </div>

      <!-- Complaint Category Dropdown -->
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">
          Complaint Category
        </label>
        <select
          name="category"
          required
          class="w-full border border-gray-300 rounded-lg px-4 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-green-500 bg-white"
        >
          <option value="" disabled selected>-- Select a category --</option>
          <option value="roads">Roads / Potholes</option>
          <option value="sanitation">Sanitation / Garbage</option>
          <option value="water">Water Supply</option>
          <option value="electricity">Electricity</option>
        </select>
      </div>

      <!-- Description -->
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">
          Complaint Description
        </label>
        <textarea
          name="description"
          rows="4"
          placeholder="Describe the issue in detail..."
          required
          class="w-full border border-gray-300 rounded-lg px-4 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-green-500 resize-none"
        ></textarea>
      </div>

      <!-- File Upload -->
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">
          Attach Photo / Video (Optional)
        </label>
        <div class="w-full border-2 border-dashed border-gray-300 rounded-lg px-4 py-6 text-center hover:border-green-500 transition">
          <input
            type="file"
            name="media"
            accept="image/*,video/*"
            class="w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-lg file:border-0 file:text-sm file:font-medium file:bg-green-50 file:text-green-700 hover:file:bg-green-100"
          />
          <p class="text-xs text-gray-400 mt-2">Supported: JPG, PNG, MP4 (Max 10MB)</p>
        </div>
      </div>

      <!-- Hidden Geolocation Fields -->
      <input type="hidden" id="latitude" name="latitude" />
      <input type="hidden" id="longitude" name="longitude" />

      <!-- Location Picker -->
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">
          Complaint Location
        </label>
        <div id="location-display" class="w-full border border-gray-300 rounded-lg px-4 py-2 text-sm bg-gray-50 text-gray-400 mb-2">
          No location selected yet. Click below to pick on map.
        </div>
        <button
          type="button"
          onclick="openMapPicker()"
          class="w-full border border-green-600 text-green-600 font-semibold py-2.5 rounded-lg text-sm hover:bg-green-50 transition"
        >
          📍 Pick Location on Map
        </button>
      </div>

      <!-- Submit Button -->
      <div>
        <button
          type="submit"
          class="w-full bg-green-600 hover:bg-green-700 text-white font-semibold py-2.5 rounded-lg text-sm transition duration-200"
        >
          Submit Complaint
        </button>
      </div>

    </form>

    <!-- Footer -->
    <p class="text-center text-xs text-gray-400 mt-6">
      GramSmart — Unified Rural Governance Platform
    </p>

  </div>
    <script>
        function openMapPicker() {
          var popup = window.open(
            '/grievances/map/',
            'MapPicker',
            'width=700,height=600,scrollbars=yes'
          );
        }
        function receiveLocation(lat, lng) {
          document.getElementById('latitude').value = lat;
          document.getElementById('longitude').value = lng;
          document.getElementById('location-display').innerHTML =
            '✅ Location selected: <strong>' + lat + ', ' + lng + '</strong>';
          document.getElementById('location-display').className =
            'w-full border border-green-300 rounded-lg px-4 py-2 text-sm bg-green-50 text-green-700 mb-2';
        }
    </script>
    <script src="{% static 'grievances/js/file_upload_validation.js' %}"></script>
    <script src="{% static 'grievances/js/geolocation_validation.js' %}"></script>
</body>
</html>
