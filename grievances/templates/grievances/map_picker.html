<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GramSmart — Pick Complaint Location</title>

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Leaflet.js CSS -->
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    crossorigin=""
  />

  <!-- Leaflet.js Script -->
  <script
    src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    crossorigin=""
  ></script>

  <style>
    #map {
      height: 400px;
      width: 100%;
      border-radius: 12px;
      z-index: 0;
    }
  </style>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center px-4 py-10">

  <div class="bg-white w-full max-w-2xl rounded-2xl shadow-lg p-6 sm:p-8">

    <!-- Header -->
    <div class="mb-6 text-center">
      <h1 class="text-2xl font-bold text-green-700">GramSmart</h1>
      <p class="text-gray-500 text-sm mt-1">Pin Your Complaint Location</p>
    </div>

    <!-- Instruction -->
    <div class="bg-green-50 border border-green-200 rounded-lg px-4 py-3 mb-4">
      <p class="text-sm text-green-700 font-medium">
        📍 Click anywhere on the map to drop a pin at the exact complaint location.
      </p>
    </div>

    <!-- Map Block -->
    <div id="map"></div>

    <!-- Coordinates Display -->
    <div class="mt-4 grid grid-cols-2 gap-4">
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Latitude</label>
        <input
          type="text"
          id="latitude"
          name="latitude"
          readonly
          placeholder="Click map to capture..."
          class="w-full border border-gray-300 rounded-lg px-4 py-2 text-sm bg-gray-50 focus:outline-none"
        />
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Longitude</label>
        <input
          type="text"
          id="longitude"
          name="longitude"
          readonly
          placeholder="Click map to capture..."
          class="w-full border border-gray-300 rounded-lg px-4 py-2 text-sm bg-gray-50 focus:outline-none"
        />
      </div>
    </div>

    <!-- Status Message -->
    <div id="pin-status" class="mt-3 text-center text-sm text-gray-400">
      No location selected yet.
    </div>

    <!-- Action Buttons -->
    <div class="mt-6 flex flex-col sm:flex-row gap-3">
      
      <a href="/grievances/log/"
        class="w-full text-center border border-green-600 text-green-600 font-semibold py-2.5 rounded-lg text-sm hover:bg-green-50 transition">
        ← Back to Complaint Form
      </a>
      <button
        onclick="confirmLocation()"
        class="w-full bg-green-600 hover:bg-green-700 text-white font-semibold py-2.5 rounded-lg text-sm transition"
      >
        Confirm Location ✓
      </button>
    </div>

  </div>

  <!-- Leaflet.js Map Initialization Script -->
  <script>
    // Default center: Nagpur, Maharashtra, India
    var defaultLat = 21.1458;
    var defaultLng = 79.0882;
    var defaultZoom = 13;

    // Initialize map
    var map = L.map('map').setView([defaultLat, defaultLng], defaultZoom);
    
    // Force map to recalculate size after popup renders
    setTimeout(function() {
      map.invalidateSize();
    }, 300);

    // Add OpenStreetMap tile layer
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      maxZoom: 19,
      attribution: '© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors'
    }).addTo(map);

    // Marker variable
    var marker = null;

    // Click event to drop pin
    map.on('click', function(e) {
      var lat = e.latlng.lat.toFixed(6);
      var lng = e.latlng.lng.toFixed(6);

      // Remove existing marker
      if (marker) {
        map.removeLayer(marker);
      }

      // Place new marker
      marker = L.marker([lat, lng]).addTo(map)
        .bindPopup('📍 Complaint Location<br>Lat: ' + lat + '<br>Lng: ' + lng)
        .openPopup();

      // Update coordinate fields
      document.getElementById('latitude').value = lat;
      document.getElementById('longitude').value = lng;

      // Update status
      document.getElementById('pin-status').innerHTML =
        '✅ Location pinned at <strong>' + lat + ', ' + lng + '</strong>';
      document.getElementById('pin-status').className =
        'mt-3 text-center text-sm text-green-600 font-medium';
    });

    // Confirm location function
    function confirmLocation() {
      var lat = document.getElementById('latitude').value;
      var lng = document.getElementById('longitude').value;
      if (!lat || !lng) {
        alert('Please click on the map to select a location first.');
        return;
      }
      // Send coordinates back to the parent complaint form
      if (window.opener && !window.opener.closed) {
        window.opener.receiveLocation(lat, lng);
        window.close();
      } else {
        alert('Location confirmed!\nLatitude: ' + lat + '\nLongitude: ' + lng);
      }
    }
  </script>

</body>
</html>
