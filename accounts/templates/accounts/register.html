<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Citizen Registration - GramSmart</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen flex items-center justify-center px-4 py-8">

  <div class="w-full max-w-md bg-white rounded-2xl shadow-lg p-6 sm:p-8">

    <div class="text-center mb-6">
      <h1 class="text-2xl font-bold text-gray-800">Citizen Registration</h1>
      <p class="text-sm text-gray-500 mt-1">Register to access GramSmart services</p>
    </div>

    <form method="POST" action="" class="space-y-5">

      <div>
        <label for="full_name" class="block text-sm font-medium text-gray-700 mb-1">Full Name</label>
        <input type="text" id="full_name" name="full_name" required
          placeholder="Enter your full name"
          class="w-full px-4 py-3 border border-gray-300 rounded-lg text-base focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent">
      </div>

      <div>
        <label for="contact_number" class="block text-sm font-medium text-gray-700 mb-1">Contact Number</label>
        <input type="tel" id="contact_number" name="contact_number" required
          pattern="[0-9]{10}" maxlength="10" inputmode="numeric"
          placeholder="10-digit mobile number"
          class="w-full px-4 py-3 border border-gray-300 rounded-lg text-base focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent">
      </div>

      <div>
        <label for="ward_number" class="block text-sm font-medium text-gray-700 mb-1">Ward Number</label>
        <select id="ward_number" name="ward_number" required
          class="w-full px-4 py-3 border border-gray-300 rounded-lg text-base bg-white focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent">
          <option value="" disabled selected>Select your ward</option>
          <option value="1">Ward 1</option>
          <option value="2">Ward 2</option>
          <option value="3">Ward 3</option>
          <option value="4">Ward 4</option>
          <option value="5">Ward 5</option>
          <option value="6">Ward 6</option>
          <option value="7">Ward 7</option>
          <option value="8">Ward 8</option>
          <option value="9">Ward 9</option>
          <option value="10">Ward 10</option>
        </select>
      </div>

      <div>
        <label for="password" class="block text-sm font-medium text-gray-700 mb-1">Password</label>
        <input type="password" id="password" name="password" required
          placeholder="Create a password"
          class="w-full px-4 py-3 border border-gray-300 rounded-lg text-base focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent">
      </div>

      <div>
        <label for="confirm_password" class="block text-sm font-medium text-gray-700 mb-1">Confirm Password</label>
        <input type="password" id="confirm_password" name="confirm_password" required
          placeholder="Re-enter your password"
          class="w-full px-4 py-3 border border-gray-300 rounded-lg text-base focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent">
      </div>

      <button type="submit"
        class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 rounded-lg transition-colors duration-200">
        Register
      </button>

    </form>

    <p class="text-center text-sm text-gray-500 mt-6">
      Already have an account?
      <a href="#" class="text-blue-600 font-medium hover:underline">Login</a>
    </p>

  </div>

</body>
