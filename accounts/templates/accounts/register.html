<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Citizen Registration - GramSmart</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen flex items-center justify-center px-4 py-8">

  <div class="w-full max-w-md bg-white rounded-2xl shadow-lg p-6 sm:p-8">

    <div class="text-center mb-6">
      <h1 class="text-2xl font-bold text-gray-800">Citizen Registration</h1>
      <p class="text-sm text-gray-500 mt-1">Register to access GramSmart services</p>
    </div>

    <form method="POST" action="" class="space-y-5">
      {% csrf_token %}
      <div>
        <label for="full_name" class="block text-sm font-medium text-gray-700 mb-1">Full Name</label>
        <input type="text" id="full_name" name="full_name" required
          placeholder="Enter your full name"
          class="w-full px-4 py-3 border border-gray-300 rounded-lg text-base focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent">
      </div>

      <div>
        <label for="contact_number" class="block text-sm font-medium text-gray-700 mb-1">Contact Number</label>
        <input type="tel" id="contact_number" name="contact_number" required
          pattern="[0-9]{10}" maxlength="10" inputmode="numeric"
          placeholder="10-digit mobile number"
          class="w-full px-4 py-3 border border-gray-300 rounded-lg text-base focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent">
      </div>

      <div>
        <label for="ward_number" class="block text-sm font-medium text-gray-700 mb-1">Ward Number</label>
        <select id="ward_number" name="ward_number" required
          class="w-full px-4 py-3 border border-gray-300 rounded-lg text-base bg-white focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent">
          <option value="" disabled selected>Select your ward</option>
          <option value="1">Ward 1</option>
          <option value="2">Ward 2</option>
          <option value="3">Ward 3</option>
          <option value="4">Ward 4</option>
          <option value="5">Ward 5</option>
          <option value="6">Ward 6</option>
          <option value="7">Ward 7</option>
          <option value="8">Ward 8</option>
          <option value="9">Ward 9</option>
          <option value="10">Ward 10</option>
        </select>
      </div>

      <div>
        <label for="password" class="block text-sm font-medium text-gray-700 mb-1">Password</label>
        <input type="password" id="password" name="password" required
          placeholder="Create a password"
          class="w-full px-4 py-3 border border-gray-300 rounded-lg text-base focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent">
      </div>

      <div>
        <label for="confirm_password" class="block text-sm font-medium text-gray-700 mb-1">Confirm Password</label>
        <input type="password" id="confirm_password" name="confirm_password" required
          placeholder="Re-enter your password"
          class="w-full px-4 py-3 border border-gray-300 rounded-lg text-base focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent">
      </div>

      <button type="submit"
        class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 rounded-lg transition-colors duration-200">
        Register
      </button>

    </form>

    <p class="text-center text-sm text-gray-500 mt-6">
      Already have an account?
      <a href="/api/auth/login-page/" class="text-blue-600 font-medium hover:underline">Login</a>
    </p>

  </div>
<script>
  document.addEventListener('DOMContentLoaded', function () {

    const form = document.querySelector('form');

    // --- Grab all input fields ---
    const fullName     = document.getElementById('full_name');
    const phone        = document.getElementById('contact_number');
    const ward         = document.getElementById('ward_number');
    const password     = document.getElementById('password');
    const confirmPass  = document.getElementById('confirm_password');

    // --- Helper: show error below a field ---
    function showError(input, message) {
      clearError(input);
      const error = document.createElement('p');
      error.className = 'text-red-500 text-sm mt-1';
      error.setAttribute('data-error-for', input.id);
      error.textContent = message;
      input.parentNode.appendChild(error);
      input.classList.add('border-red-500');
    }

    // --- Helper: clear error for a field ---
    function clearError(input) {
      const existing = document.querySelector('[data-error-for="' + input.id + '"]');
      if (existing) existing.remove();
      input.classList.remove('border-red-500');
    }

    // --- Live clearing: error disappears as user fixes the field ---
    [fullName, phone, ward, password, confirmPass].forEach(function(input) {
      if (input) {
        input.addEventListener('input', function () { clearError(input); });
        input.addEventListener('change', function () { clearError(input); });
      }
    });

    // --- Main validation on submit ---
    form.addEventListener('submit', function (e) {
      e.preventDefault();
      let isValid = true;

      // Full Name — must not be empty
      if (!fullName.value.trim()) {
        showError(fullName, 'Full name is required.');
        isValid = false;
      }

      // Phone — digits only, exactly 10 digits
      const phoneVal = phone.value.trim();
      if (!phoneVal) {
        showError(phone, 'Contact number is required.');
        isValid = false;
      } else if (!/^\d+$/.test(phoneVal)) {
        showError(phone, 'Contact number must contain digits only.');
        isValid = false;
      } else if (phoneVal.length !== 10) {
        showError(phone, 'Contact number must be exactly 10 digits.');
        isValid = false;
      }

      // Ward — must be selected (not empty/default)
      if (!ward.value || ward.value === '') {
        showError(ward, 'Please select your Ward number.');
        isValid = false;
      }

      // Password — minimum 8 characters
      if (!password.value) {
        showError(password, 'Password is required.');
        isValid = false;
      } else if (password.value.length < 8) {
        showError(password, 'Password must be at least 8 characters.');
        isValid = false;
      }

      // Confirm Password — must match password
      if (!confirmPass.value) {
        showError(confirmPass, 'Please confirm your password.');
        isValid = false;
      } else if (confirmPass.value !== password.value) {
        showError(confirmPass, 'Passwords do not match.');
        isValid = false;
      }

      // --- All checks passed: submit to API ---
      if (isValid) {
        const submitBtn = form.querySelector('button[type="submit"]');
        submitBtn.disabled = true;
        submitBtn.textContent = 'Registering...';

        fetch('/api/auth/register/', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'X-CSRFToken': document.querySelector('[name=csrfmiddlewaretoken]').value
          },
          body: JSON.stringify({
            username: phoneVal,
            email: '',
            password: password.value,
            phone_number: phoneVal,
            ward_number: ward.value
          })
        })
        .then(function (response) {
          return response.json().then(function (data) {
            return { status: response.status, body: data };
          });
        })
        .then(function (result) {
          if (result.status === 201) {
            alert('Registration successful! Please log in.');
            window.location.href = '/api/auth/login-page/';
          } else {
            let messages = [];
            for (const field in result.body) {
              messages.push(field + ': ' + result.body[field]);
            }
            alert('Registration failed:\n' + messages.join('\n'));
            submitBtn.disabled = false;
            submitBtn.textContent = 'Register';
          }
        })
        .catch(function (err) {
          alert('Something went wrong. Please try again.');
          submitBtn.disabled = false;
          submitBtn.textContent = 'Register';
        });
      }
    });

  });
</script>

</body>
</html>
