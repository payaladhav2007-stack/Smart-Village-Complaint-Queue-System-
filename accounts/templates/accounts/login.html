{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#2563eb">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>Login - GramSmart</title>
<link rel="manifest" href="{% static 'accounts/manifest.json' %}">
<link rel="icon" href="{% static 'accounts/icon.svg' %}" type="image/svg+xml">
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen flex items-center justify-center px-4 py-8">

  <div class="w-full max-w-md bg-white rounded-2xl shadow-lg p-6 sm:p-8">

    <div class="text-center mb-6">
      <h1 class="text-2xl font-bold text-gray-800">Welcome Back</h1>
      <p class="text-sm text-gray-500 mt-1">Log in to access GramSmart services</p>
    </div>

    <form method="POST" action="" class="space-y-5">

      <div>
        <label for="contact_number" class="block text-sm font-medium text-gray-700 mb-1">Contact Number</label>
        <input type="tel" id="contact_number" name="contact_number" required
          pattern="[0-9]{10}" maxlength="10" inputmode="numeric"
          placeholder="10-digit mobile number"
          class="w-full px-4 py-3 border border-gray-300 rounded-lg text-base focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent">
      </div>

      <div>
        <label for="password" class="block text-sm font-medium text-gray-700 mb-1">Password</label>
        <input type="password" id="password" name="password" required
          placeholder="Enter your password"
          class="w-full px-4 py-3 border border-gray-300 rounded-lg text-base focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent">
      </div>

      <div class="text-right">
        <a href="#" class="text-sm text-blue-600 font-medium hover:underline">Forgot password?</a>
      </div>

      <button type="submit"
        class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 rounded-lg transition-colors duration-200">
        Log In
      </button>

    </form>

    <p class="text-center text-sm text-gray-500 mt-6">
      Don't have an account?
      <a href="register.html" class="text-blue-600 font-medium hover:underline">Register</a>
    </p>

  </div>

</body>
</html>
